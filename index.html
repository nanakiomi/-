<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="时间管理者">
<meta name="theme-color" content="#5a7e50">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>时间管理者</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eff0e2; --bg2: #e4e6d5; --surface: #fafaf2; --surface2: #eeeee0; --surface3: #e2e4d2;
  --border: #d2d8be; --border2: #bcc4a8; --ink: #22251a; --ink2: #5a6248; --ink3: #9ea882;
  --accent: #5a7e50; --accent-soft: rgba(74,124,89,0.13); --teal: #4a7a68; --teal-soft: rgba(46,122,106,0.12);
  --gold: #f0a8b0; --gold-soft: rgba(240,168,176,0.14); --plum: #c9a0d4; --plum-soft: rgba(201,160,212,0.15);
  --sage: #6a8c52; --sage-soft: rgba(106,140,82,0.12); --slate: #7a5a9e; --slate-soft: rgba(122,90,158,0.12);
  --green: #5a7e50; --danger: #b04840; --radius: 16px; --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(26,35,26,0.06); --shadow-lg: 0 8px 40px rgba(26,35,26,0.13);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:999; opacity:0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
.app { display:flex; height:100vh; }
.sidebar { width:248px; min-width:248px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.logo { padding:24px 20px 20px; border-bottom:1px solid var(--border); }
.logo-mark { display:flex; align-items:center; gap:8px; }
.logo-dot { width:28px; height:28px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; filter:brightness(1.1); }
.logo h1 { font-size:15px; font-weight:700; color:var(--ink); letter-spacing:-0.3px; }
.logo p { font-size:10px; color:var(--ink3); margin-top:3px; letter-spacing:0.5px; font-family:'Outfit', sans-serif; }
.nav { padding:14px 10px 8px; }
.nav-btn { display:flex; align-items:center; gap:9px; width:100%; padding:9px 12px; border-radius:var(--radius-sm); border:none; background:transparent; color:var(--ink2); font-size:13px; font-family:inherit; cursor:pointer; transition:all 0.18s; text-align:left; }
.nav-btn:hover { background:var(--surface3); color:var(--ink); }
.nav-btn.active { background:var(--accent); color:#fff; }
.nav-btn .icon { font-size:15px; width:18px; text-align:center; opacity:0.8; }
.sidebar-divider { height:1px; background:var(--border); margin:8px 16px; }
.sidebar-label { font-size:9px; color:var(--ink3); text-transform:uppercase; letter-spacing:2px; font-weight:600; padding:12px 20px 6px; font-family:'Outfit',sans-serif; }
.upcoming-list { flex:1; overflow-y:auto; padding:0 10px 16px; }
.up-item { padding:9px 12px; border-radius:var(--radius-sm); margin-bottom:3px; cursor:pointer; transition:background 0.15s; position:relative; overflow:hidden; }
.up-item:hover { background:var(--surface3); }
.up-item::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:2px; border-radius:2px; }
.up-date { font-size:10px; color:var(--ink3); font-family:'Outfit',sans-serif; }
.up-title { font-size:12px; color:var(--ink2); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
.top-bar { padding:18px 28px 0; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.top-bar-left h2 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.top-bar-left .date-hint { font-size:11px; color:var(--ink3); margin-top:2px; font-family:'Outfit',sans-serif; }
.view-toggle { display:flex; gap:3px; background:var(--surface3); border-radius:var(--radius-sm); padding:3px; }
.vt-btn { padding:6px 14px; border-radius:8px; border:none; background:transparent; color:var(--ink2); font-size:12px; font-weight:500; font-family:inherit; cursor:pointer; transition:all 0.18s; }
.vt-btn.active { background:var(--surface); color:var(--ink); box-shadow:var(--shadow); }
.input-wrap { padding:14px 28px 0; flex-shrink:0; }
.input-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color 0.2s, box-shadow 0.2s; box-shadow:var(--shadow); }
.input-card:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft), var(--shadow); }
.input-ta { width:100%; background:transparent; border:none; outline:none; color:var(--ink); font-size:14px; font-family:inherit; padding:14px 16px 10px; resize:none; min-height:52px; max-height:100px; line-height:1.6; }
.input-ta::placeholder { color:var(--ink3); }
.input-bar { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-top:1px solid var(--border); background:var(--surface2); }
.input-hint { font-size:11px; color:var(--ink3); font-family:'Outfit',sans-serif; }
.input-btns { display:flex; gap:6px; align-items:center; }
.btn-mic { width:32px; height:32px; border-radius:50%; border:1.5px solid var(--border2); background:var(--surface); color:var(--ink2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; transition:all 0.18s; }
.btn-mic:hover { border-color:var(--accent); color:var(--accent); }
.btn-parse { height:32px; padding:0 18px; border-radius:var(--radius-sm); background:var(--accent); border:none; color:#fff; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; transition:all 0.18s; letter-spacing:0.2px; }
.btn-parse:hover { background:#4a6e42; }
.btn-parse:disabled { opacity:0.4; cursor:not-allowed; }
.preview-wrap { padding:10px 28px 0; flex-shrink:0; }
.preview-card { background:var(--surface); border:1.5px solid var(--accent); border-radius:var(--radius); overflow:hidden; box-shadow:0 0 0 3px var(--accent-soft), var(--shadow); }
.preview-hd { padding:10px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; background:var(--accent-soft); }
.ai-badge { font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--accent); font-family:'Outfit',sans-serif; }
.preview-hd .ph { flex:1; font-size:12px; color:var(--ink2); }
.preview-bd { padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pf { display:flex; flex-direction:column; gap:4px; }
.pf.full { grid-column:1/-1; }
.pf label { font-size:9px; color:var(--ink3); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; font-family:'Outfit',sans-serif; }
.pf input, .pf select { background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--radius-sm); color:var(--ink); font-family:inherit; font-size:13px; padding:7px 10px; outline:none; transition:border-color 0.18s; }
.reminder-chips { display:flex; gap:4px; flex-wrap:wrap; }
.r-chip { padding:4px 10px; border-radius:20px; font-size:11px; cursor:pointer; border:1.5px solid var(--border2); background:var(--surface2); color:var(--ink2); transition:all 0.15s; font-family:inherit; }
.r-chip.sel { background:var(--accent); border-color:var(--accent); color:#fff; }
.preview-ft { padding:10px 16px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; background:var(--surface2); }
.btn-confirm { height:32px; padding:0 20px; border-radius:var(--radius-sm); background:var(--green); border:none; color:#fff; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; transition:opacity 0.18s; }
.btn-cancel { height:32px; padding:0 14px; border-radius:var(--radius-sm); background:transparent; border:1.5px solid var(--border2); color:var(--ink2); font-size:12px; font-family:inherit; cursor:pointer; transition:all 0.18s; }
.content-scroll { flex:1; overflow-y:auto; padding:14px 28px 28px; }
.date-group-hd { display:flex; align-items:baseline; gap:8px; padding:10px 0 6px; margin-bottom:4px; }
.dgh-label { font-size:11px; font-weight:700; color:var(--ink); }
.dgh-line { flex:1; height:1px; background:var(--border); margin-left:8px; }
.sched-item { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; gap:12px; transition:all 0.18s; box-shadow:var(--shadow); position:relative; overflow:hidden; margin-bottom: 8px;}
.sched-item.completed { opacity:0.45; }
.sched-item.completed .si-title { text-decoration:line-through; }
.si-stripe { position:absolute; left:0; top:0; bottom:0; width:5px; border-radius:5px 0 0 5px; }
.si-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--border2); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.18s; background:transparent; }
.si-check.checked { background:var(--green); border-color:var(--green); }
.si-check.checked::after { content:'✓'; font-size:11px; color:#fff; font-weight:700; }
.si-body { flex:1; min-width:0; cursor:pointer; }
.si-title { font-size:14px; font-weight:500; color:var(--ink); }
.si-meta { font-size:11px; color:var(--ink3); margin-top:2px; display:flex; gap:10px; flex-wrap:wrap; font-family:'Outfit',sans-serif; }
.cal-nav { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.cal-nav-btn { width:30px; height:30px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); color:var(--ink2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all 0.15s; box-shadow:var(--shadow); }
.cal-today-btn { padding:5px 12px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); color:var(--ink2); font-size:11px; font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.15s; font-weight:500; box-shadow:var(--shadow); }
.timetable { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.tt-head { display:grid; border-bottom:1.5px solid var(--border); }
.tt-head-cell { padding:10px 6px; text-align:center; border-right:1px solid var(--border); font-size:11px; color:var(--ink2); }
.tt-head-cell.today .th-num { background:var(--accent); color:#fff; border-radius:50%; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; }
.th-num { font-size:16px; font-weight:700; margin-top:2px; display:inline-block; }
.tt-body { display:grid; }
.tt-time-col { border-right:1px solid var(--border); }
.tt-time-slot { height:52px; border-bottom:1px solid rgba(228,221,208,0.6); display:flex; align-items:flex-start; justify-content:flex-end; padding:4px 8px 0 0; font-size:10px; color:var(--ink3); font-family:'Outfit',sans-serif; }
.tt-day-col { position:relative; border-right:1px solid var(--border); }
.tt-slot { height:52px; border-bottom:1px solid rgba(228,221,208,0.4); }
.tt-event { position:absolute; left:2px; right:2px; border-radius:8px; padding:3px 6px; font-size:10px; font-weight:600; overflow:hidden; cursor:pointer; z-index:2; line-height:1.3; transition:all 0.15s; }
.modal-backdrop { position:fixed; inset:0; background:rgba(26,35,26,0.35); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); width:380px; max-width:90vw; box-shadow:var(--shadow-lg); }
.modal-hd { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-hd h3 { font-size:15px; font-weight:700; }
.modal-close { width:28px; height:28px; border-radius:8px; border:none; background:var(--surface3); color:var(--ink2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; }
.modal-bd { padding:16px 20px; display:flex; flex-direction:column; gap:8px; }
.cat-row { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); background:var(--surface2); border:1.5px solid var(--border); }
.cat-swatch { width:22px; height:22px; border-radius:50%; flex-shrink:0; border:2px solid rgba(0,0,0,0.08); }
.cat-input { flex:1; background:transparent; border:none; outline:none; font-family:inherit; font-size:13px; font-weight:500; color:var(--ink); }
.modal-ft { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.stripe-accent { background:var(--accent); } .stripe-teal { background:var(--teal); } .stripe-gold { background:var(--gold); } .stripe-plum { background:var(--plum); } .stripe-sage { background:var(--sage); } .stripe-slate { background:var(--slate); }
.ev-accent { background:var(--accent-soft); color:var(--accent); border:1px solid rgba(194,98,42,0.2); } .ev-teal { background:var(--teal-soft); color:var(--teal); border:1px solid rgba(42,124,124,0.2); } .ev-gold { background:var(--gold-soft); color:var(--gold); border:1px solid rgba(184,150,46,0.2); } .ev-plum { background:var(--plum-soft); color:var(--plum); border:1px solid rgba(124,58,110,0.2); } .ev-sage { background:var(--sage-soft); color:var(--sage); border:1px solid rgba(74,122,84,0.2); } .ev-slate { background:var(--slate-soft); color:var(--slate); border:1px solid rgba(58,90,124,0.2); }
.toast-wrap { position:fixed; top:18px; right:18px; z-index:9999; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
@media(max-width:768px){ .toast-wrap { top:auto; bottom:96px; left:16px; right:16px; } }
.toast { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:12px 16px; min-width:240px; box-shadow:var(--shadow-lg); display:flex; align-items:flex-start; gap:10px; }
.toast.reminder { border-left:3px solid var(--accent); } .toast.success { border-left:3px solid var(--sage); }
.t-icon { font-size:16px; } .t-title { font-size:13px; font-weight:600; color:var(--ink); } .t-msg { font-size:11px; color:var(--ink2); margin-top:2px; font-family:'Outfit',sans-serif; }
.empty { text-align:center; padding:52px 20px; color:var(--ink3); } .empty p { font-size:13px; }
::-webkit-scrollbar { width:4px; height:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.color-picker { display:flex; gap:8px; flex-wrap:wrap; } .cp-option { width:28px; height:28px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all 0.15s; } .cp-option.sel { border-color:var(--ink); transform:scale(1.15); }
@media (max-width: 768px) {
  .app { flex-direction: column; } .sidebar { display: none; } .main { width: 100%; padding-bottom: 80px; }
  .top-bar { padding: 16px 16px 0; } .top-bar-left h2 { font-size: 18px; }
  .input-wrap { padding: 12px 16px 0; } .input-ta { font-size: 16px !important; }
  .preview-wrap { padding: 10px 16px 0; } .modal { width: 92vw; } .preview-bd { grid-template-columns: 1fr; } .pf { grid-column: 1 !important; }
  .content-scroll { padding: 12px 16px 24px; } .sched-item { padding: 14px 14px 14px 18px; } .si-check { width: 24px; height: 24px; } .si-title { font-size: 15px; }
  .timetable { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .bottom-nav { display: flex !important; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1.5px solid var(--border); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 50; box-shadow: 0 -4px 20px rgba(26,35,26,0.08); }
  .bn-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; border: none; background: transparent; color: var(--ink3); font-size: 10px; font-family: inherit; font-weight: 500; cursor: pointer; transition: color 0.18s; }
  .bn-btn .bn-icon { font-size: 20px; line-height: 1; } .bn-btn.active { color: var(--accent); } .view-toggle { display: none; }
  .btn-mic { width: 38px; height: 38px; font-size: 17px; } .btn-parse { height: 38px; padding: 0 20px; font-size: 13px; }
  .cal-nav { flex-wrap: wrap; gap: 8px; } .cal-range { font-size: 12px; }
  .pf input, .pf select, #eTitle, #eDate, #eStart, #eEnd, #eNote, #eReminder { font-size: 16px !important; padding: 10px 12px !important; } .cp-option { width: 36px; height: 36px; }
}
.bottom-nav { display: none; }
</style>
</head>

<div class="app">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark"><div class="logo-dot">◈</div><div><h1>时间管理者</h1><p>智能日程 · 时间管理者</p></div></div>
  </div>
  <nav class="nav" style="padding-top:12px">
    <button class="nav-btn active" id="sn-list" onclick="setView('list')"><span class="icon">≡
