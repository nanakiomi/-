<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="时间管理者">
<meta name="theme-color" content="#5a7e50">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>时间管理者</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eff0e2;
  --bg2: #e4e6d5;
  --surface: #fafaf2;
  --surface2: #eeeee0;
  --surface3: #e2e4d2;
  --border: #d2d8be;
  --border2: #bcc4a8;
  --ink: #22251a;
  --ink2: #5a6248;
  --ink3: #9ea882;
  --accent: #5a7e50;
  --accent-soft: rgba(90,126,80,0.12);
  --pink: #f0a8b0;
  --pink-soft: rgba(240,168,176,0.15);
  --plum: #c9a0d4;
  --plum-soft: rgba(201,160,212,0.15);
  --teal: #4a7a68;
  --teal-soft: rgba(74,122,104,0.12);
  --gold: #c8a86a;
  --gold-soft: rgba(200,168,106,0.15);
  --sage: #6a8c52;
  --sage-soft: rgba(106,140,82,0.12);
  --red: #c05050;
  --shadow: 0 2px 12px rgba(26,35,26,0.07);
  --shadow-lg: 0 8px 32px rgba(26,35,26,0.12);
  --r: 14px;
  --r-sm: 9px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit','Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Sidebar */
.logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:9px}
.logo-icon{width:30px;height:30px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fafaf2}
.logo h1{font-size:14px;font-weight:700;color:var(--ink)}
.logo p{font-size:10px;color:var(--ink3);margin-top:1px;letter-spacing:0.5px}
.nav{padding:12px 8px 6px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 11px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--ink2);font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.15s;text-align:left}
.nav-btn:hover{background:var(--surface3);color:var(--ink)}
.nav-btn.active{background:var(--accent);color:#fafaf2}
.nav-btn .ni{font-size:14px;width:16px;text-align:center}
.sidebar-sep{height:1px;background:var(--border);margin:6px 14px}
.sidebar-lbl{font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:2px;font-weight:600;padding:10px 18px 5px}
.upcoming{flex:1;overflow-y:auto;padding:0 8px 16px}
.up-item{padding:8px 10px;border-radius:var(--r-sm);margin-bottom:3px;cursor:pointer;border-left:3px solid transparent;transition:background 0.12s}
.up-item:hover{background:var(--surface3)}
.up-date{font-size:10px;color:var(--ink3)}
.up-title{font-size:12px;color:var(--ink2);font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Top bar */
.topbar{padding:18px 24px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.topbar-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.view-tabs{display:flex;gap:3px;background:var(--surface3);border-radius:var(--r-sm);padding:3px}
.vtab{padding:6px 13px;border-radius:7px;border:none;background:transparent;color:var(--ink2);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:all 0.15s}
.vtab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* Input */
.input-area{padding:12px 24px 0;flex-shrink:0}
.input-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color 0.15s;box-shadow:var(--shadow)}
.input-box:focus-within{border-color:var(--accent)}
.input-ta{width:100%;background:transparent;border:none;outline:none;color:var(--ink);font-size:14px;font-family:inherit;padding:13px 15px 9px;resize:none;min-height:50px;max-height:90px;line-height:1.6}
.input-ta::placeholder{color:var(--ink3)}
.input-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-top:1px solid var(--border);background:var(--surface2)}
.input-hint{font-size:11px;color:var(--ink3)}
.input-btns{display:flex;gap:5px;align-items:center}
.btn-mic{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s}
.btn-mic:hover{border-color:var(--accent);color:var(--accent)}
.btn-mic.rec{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1s infinite}
.btn-go{height:32px;padding:0 16px;border-radius:var(--r-sm);background:var(--accent);border:none;color:#fafaf2;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity 0.15s}
.btn-go:hover{opacity:0.85}
.btn-go:disabled{opacity:0.4;cursor:not-allowed}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Preview */
.preview-area{padding:10px 24px 0;flex-shrink:0}
.preview-card{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--r);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow);animation:slideDown 0.2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.pv-head{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--accent-soft)}
.pv-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--accent)}
.pv-hint{font-size:12px;color:var(--ink2);flex:1}
.pv-body{padding:14px 15px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.pv-full{grid-column:1/-1}
.pf label{display:block;font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:4px}
.pf input,.pf select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--ink);font-family:inherit;font-size:13px;padding:7px 9px;outline:none;transition:border-color 0.15s}
.pf input:focus,.pf select:focus{border-color:var(--accent)}
.pf select option{background:var(--surface)}
.rchips{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rchip{padding:4px 9px;border-radius:20px;font-size:11px;font-family:inherit;cursor:pointer;border:1.5px solid var(--border2);background:var(--surface2);color:var(--ink2);transition:all 0.12s}
.rchip.sel{background:var(--accent);border-color:var(--accent);color:#fafaf2}
.pv-foot{padding:10px 15px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;background:var(--surface2)}
.btn-confirm{height:32px;padding:0 18px;border-radius:var(--r-sm);background:var(--teal);border:none;color:#fafaf2;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity 0.15s}
.btn-confirm:hover{opacity:0.85}
.btn-cancel{height:32px;padding:0 13px;border-radius:var(--r-sm);background:transparent;border:1.5px solid var(--border2);color:var(--ink2);font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.15s}
.btn-cancel:hover{background:var(--surface3)}

/* Content */
.content{flex:1;overflow-y:auto;padding:12px 24px 24px}

/* Date group */
.dg-head{display:flex;align-items:baseline;gap:7px;padding:8px 0 5px;margin-bottom:3px}
.dg-label{font-size:11px;font-weight:700}
.dg-day{font-size:10px;color:var(--ink3)}
.dg-line{flex:1;height:1px;background:var(--border);margin-left:6px}
.sched-list{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}

/* Schedule item */
.si{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 13px 12px 17px;display:flex;align-items:center;gap:11px;position:relative;overflow:hidden;transition:all 0.15s;cursor:grab;box-shadow:var(--shadow)}
.si:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(26,35,26,0.1);transform:translateY(-1px)}
.si.done{opacity:0.4}
.si.done .si-title{text-decoration:line-through}
.si.drag-over{border-color:var(--accent);background:var(--accent-soft)}
.si-stripe{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:5px 0 0 5px}
.si-check{width:21px;height:21px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.si-check:hover{border-color:var(--teal)}
.si-check.checked{background:var(--teal);border-color:var(--teal)}
.si-check.checked::after{content:'✓';font-size:11px;color:#fafaf2;font-weight:700}
.si-body{flex:1;min-width:0}
.si-title{font-size:14px;font-weight:500;cursor:pointer}
.si-meta{font-size:11px;color:var(--ink3);margin-top:2px;display:flex;gap:9px;flex-wrap:wrap}
.si-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.12s}
.si:hover .si-actions{opacity:1}
.act-btn{width:27px;height:27px;border-radius:7px;border:none;background:var(--surface3);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.12s}
.act-btn:hover{background:var(--bg2)}
.act-btn.del:hover{background:rgba(192,80,80,0.12);color:var(--red)}

/* Color stripes */
.s-accent{background:var(--accent)}.s-teal{background:var(--teal)}.s-pink{background:var(--pink)}.s-plum{background:var(--plum)}.s-sage{background:var(--sage)}.s-gold{background:var(--gold)}

/* Timetable */
.cal-nav{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.cal-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.12s;box-shadow:var(--shadow)}
.cal-btn:hover{border-color:var(--border2)}
.cal-label{font-size:13px;font-weight:600}
.cal-today{padding:5px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);font-size:11px;font-family:inherit;cursor:pointer;transition:all 0.12s;box-shadow:var(--shadow)}
.cal-today:hover{border-color:var(--accent);color:var(--accent)}
.tt{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.tt-head{display:grid;border-bottom:1.5px solid var(--border)}
.tt-hc{padding:9px 5px;text-align:center;border-right:1px solid var(--border);font-size:11px;color:var(--ink2)}
.tt-hc:last-child{border-right:none}
.tt-hc.today .tt-hn{background:var(--accent);color:#fafaf2;border-radius:50%;width:25px;height:25px;display:inline-flex;align-items:center;justify-content:center}
.tt-hd{font-size:9px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase}
.tt-hn{font-size:15px;font-weight:700;margin-top:1px;display:inline-block}
.tt-body{display:grid}
.tt-tc{border-right:1px solid var(--border)}
.tt-ts{height:50px;border-bottom:1px solid rgba(210,216,190,0.5);display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 7px 0 0;font-size:10px;color:var(--ink3)}
.tt-dc{position:relative;border-right:1px solid var(--border)}
.tt-dc:last-child{border-right:none}
.tt-slot{height:50px;border-bottom:1px solid rgba(210,216,190,0.35)}
.tt-ev{position:absolute;left:2px;right:2px;border-radius:7px;padding:3px 5px;font-size:10px;font-weight:600;overflow:hidden;cursor:pointer;z-index:2;line-height:1.3;transition:all 0.12s}
.tt-ev:hover{filter:brightness(0.9)}
.tt-ev.done{opacity:0.35;text-decoration:line-through}
.tt-et{font-size:9px;opacity:0.7;font-weight:400}
.tt-now{position:absolute;left:0;right:0;height:2px;background:var(--accent);z-index:3}
.tt-now::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--accent)}
/* Event colors */
.ev-accent{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(90,126,80,0.2)}
.ev-teal{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(74,122,104,0.2)}
.ev-pink{background:var(--pink-soft);color:#c06070;border:1px solid rgba(240,168,176,0.3)}
.ev-plum{background:var(--plum-soft);color:#8a60a0;border:1px solid rgba(201,160,212,0.3)}
.ev-sage{background:var(--sage-soft);color:var(--sage);border:1px solid rgba(106,140,82,0.2)}
.ev-gold{background:var(--gold-soft);color:#8a6830;border:1px solid rgba(200,168,106,0.3)}

/* Modal */
.backdrop{position:fixed;inset:0;background:rgba(26,35,26,0.3);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);width:370px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp 0.2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:14px;font-weight:700}
.modal-x{width:27px;height:27px;border-radius:7px;border:none;background:var(--surface3);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.12s}
.modal-x:hover{background:var(--border)}
.modal-body{padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.modal-foot{padding:11px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;background:var(--surface2)}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mf label{display:block;font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:4px}
.mf input,.mf select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--ink);font-family:inherit;font-size:14px;padding:8px 10px;outline:none;transition:border-color 0.15s}
.mf input:focus,.mf select:focus{border-color:var(--accent)}
/* Color picker */
.cpicker{display:flex;gap:7px;flex-wrap:wrap}
.cp{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.cp.sel{border-color:var(--ink);transform:scale(1.15)}
/* Cat rows */
.cat-row{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r-sm);background:var(--surface2);border:1.5px solid var(--border)}
.cat-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,0.08)}
.cat-in{flex:1;background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--ink)}

/* Toast */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 15px;min-width:220px;box-shadow:var(--shadow-lg);animation:toastIn 0.2s ease;display:flex;align-items:flex-start;gap:9px}
.toast.reminder{border-left:3px solid var(--gold)}
.toast.success{border-left:3px solid var(--teal)}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.t-ico{font-size:15px}
.t-title{font-size:13px;font-weight:600}
.t-msg{font-size:11px;color:var(--ink2);margin-top:1px}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--ink3)}
.empty-ico{font-size:30px;margin-bottom:10px;opacity:0.4}
.empty p{font-size:13px}

/* Spinner */
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Bottom nav (mobile) */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1.5px solid var(--border);padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:50;box-shadow:0 -3px 16px rgba(26,35,26,0.07)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;border:none;background:transparent;color:var(--ink3);font-size:10px;font-family:inherit;font-weight:500;cursor:pointer;transition:color 0.15s}
.bnav-btn .bi{font-size:19px;line-height:1}
.bnav-btn.active{color:var(--accent)}

/* Mobile */
@media(max-width:700px){
  .sidebar{display:none}
  .main{width:100%;padding-bottom:75px}
  .topbar{padding:14px 16px 0}
  .input-area{padding:11px 16px 0}
  .preview-area{padding:9px 16px 0}
  .content{padding:11px 16px 20px}
  .input-ta{font-size:16px!important}
  .mf input,.mf select,.pf input,.pf select{font-size:16px!important;padding:10px 11px!important}
  .si{padding:13px 12px 13px 16px}
  .si-check{width:24px;height:24px}
  .si-title{font-size:15px}
  .si-actions{opacity:1!important}
  .act-btn{width:32px;height:32px}
  .bnav{display:flex}
  .view-tabs{display:none}
  .toast-wrap{top:auto;bottom:85px;left:14px;right:14px}
  .cp{width:34px;height:34px}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-row">
      <div class="logo-icon">◈</div>
      <div>
        <h1>时间管理者</h1>
        <p>SMART SCHEDULER</p>
      </div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" id="sn-list" onclick="setView('list')"><span class="ni">≡</span>日程列表</button>
    <button class="nav-btn" id="sn-week" onclick="setView('week')"><span class="ni">⊞</span>周视图</button>
    <button class="nav-btn" id="sn-day" onclick="setView('day')"><span class="ni">◻</span>日视图</button>
  </nav>
  <div class="sidebar-sep"></div>
  <button class="nav-btn" style="margin:0 8px 4px" onclick="openCatModal()"><span class="ni">⚙</span>分类设置</button>
  <div class="sidebar-sep"></div>
  <div class="sidebar-lbl">即将到来</div>
  <div class="upcoming" id="upcomingEl"></div>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <div>
      <h2 id="viewTitle">日程列表</h2>
      <div class="topbar-sub" id="viewSub"></div>
    </div>
    <div class="view-tabs">
      <button class="vtab active" id="vt-list" onclick="setView('list')">列表</button>
      <button class="vtab" id="vt-week" onclick="setView('week')">周</button>
      <button class="vtab" id="vt-day" onclick="setView('day')">日</button>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area" id="inputArea">
    <div class="input-box">
      <textarea class="input-ta" id="inputTa" rows="2" placeholder="输入日程…如：明天下午3点和导师开会1小时"></textarea>
      <div class="input-bar">
        <span class="input-hint">自动识别时间、时长、分类</span>
        <div class="input-btns">
          <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="语音输入">🎤</button>
          <button class="btn-go" id="goBtn" onclick="doRecognize()">✦ 识别日程</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="contentEl">
  <div class="preview-area" id="previewArea" style="display:none"></div>
    <div id="listView"></div>
    <div id="weekView" style="display:none"></div>
    <div id="dayView" style="display:none"></div>
  </div>
</main>
</div>

<!-- Bottom nav -->
<nav class="bnav" id="bnavEl">

  <button class="bnav-btn" id="bn-week" onclick="setView('week')"><span class="bi">⊞</span>周</button>
  <button class="bnav-btn" id="bn-day" onclick="setView('day')"><span class="bi">◻</span>日</button>
  <button class="bnav-btn" id="bn-cat" onclick="openCatModal()"><span class="bi">⚙</span>分类</button>
</nav>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
var COLORS = ['accent','teal','pink','plum','sage','gold'];
var COLOR_HEX = {accent:'#5a7e50',teal:'#4a7a68',pink:'#f0a8b0',plum:'#c9a0d4',sage:'#6a8c52',gold:'#c8a86a'};
var DEFAULT_LABELS = {accent:'绿·会议',teal:'青·截止',pink:'粉·社交',plum:'芋·学习',sage:'草·运动',gold:'金·其他'};
var COLOR_LABELS = JSON.parse(localStorage.getItem('cat_labels') || JSON.stringify(DEFAULT_LABELS));
var HOURS = [];
for(var i=7;i<=22;i++) HOURS.push(i);

// ── STATE ────────────────────────────────────────────────────────
var schedules = JSON.parse(localStorage.getItem('sched_tm') || '[]');
var curView = 'list';
var weekOff = 0;
var dayOff = 0;
var dragSrc = null;
var isRec = false;
var recog = null;
var rTimers = {};

function today(off) {
  off = off || 0;
  var d = new Date();
  d.setDate(d.getDate() + off);
  return d.toISOString().split('T')[0];
}

// Seed data
if (!schedules.length) {
  schedules = [
    {id:1,title:'与导师开会',date:today(),startTime:'14:00',endTime:'15:00',color:'teal',reminder:10,done:false,note:'讨论论文进展'},
    {id:2,title:'作业提交截止',date:today(),startTime:'23:59',endTime:'23:59',color:'accent',reminder:60,done:false,note:''},
    {id:3,title:'小组讨论',date:today(1),startTime:'10:00',endTime:'11:30',color:'plum',reminder:5,done:false,note:''},
    {id:4,title:'CV 投递 BlackRock',date:today(1),startTime:'09:00',endTime:'09:30',color:'sage',reminder:15,done:false,note:''},
    {id:5,title:'职业中心预约',date:today(2),startTime:'14:30',endTime:'15:30',color:'gold',reminder:10,done:false,note:'带打印好的CV'}
  ];
  save();
}

function save() {
  localStorage.setItem('sched_tm', JSON.stringify(schedules));
  setupReminders();
}
function saveLabels() {
  localStorage.setItem('cat_labels', JSON.stringify(COLOR_LABELS));
}
function newId() {
  return Date.now() + Math.floor(Math.random() * 999);
}

// ── REMINDERS ────────────────────────────────────────────────────
function setupReminders() {
  var keys = Object.keys(rTimers);
  for (var i=0; i<keys.length; i++) clearTimeout(rTimers[keys[i]]);
  rTimers = {};
  var now = new Date();
  for (var i=0; i<schedules.length; i++) {
    var s = schedules[i];
    if (s.done || !s.reminder) continue;
    var dt = new Date(s.date + 'T' + s.startTime);
    var fire = new Date(dt.getTime() - s.reminder * 60000);
    var ms = fire - now;
    if (ms > 0 && ms < 604800000) {
      (function(sc) {
        rTimers[sc.id] = setTimeout(function() {
          showToast('🔔 ' + sc.reminder + '分钟后提醒', sc.title + ' · ' + sc.startTime, 'reminder');
        }, ms);
      })(s);
    }
  }
}
if (Notification && Notification.permission === 'default') Notification.requestPermission();

// ── TOAST ────────────────────────────────────────────────────────
function showToast(title, msg, type) {
  type = type || 'success';
  var c = document.getElementById('toastWrap');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = '<div class="t-ico">' + (type==='reminder'?'🔔':'✅') + '</div><div><div class="t-title">' + title + '</div><div class="t-msg">' + msg + '</div></div>';
  c.appendChild(t);
  setTimeout(function() {
    t.style.transition = 'opacity 0.3s';
    t.style.opacity = '0';
    setTimeout(function() { t.remove(); }, 300);
  }, 3200);
}

// ── RECOGNIZE ────────────────────────────────────────────────────
function doRecognize() {
  var ta = document.getElementById('inputTa');
  if (!ta) { alert('找不到输入框'); return; }
  var text = ta.value.trim();
  if (!text) { showToast('提示', '请先输入日程描述', 'reminder'); return; }
  var btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.textContent = '识别中…';
  var pa = document.getElementById('previewArea');
  if (pa) { pa.innerHTML = ''; pa.style.display = 'none'; }
  setTimeout(function() {
    try {
      var result = parseText(text);
      showPreview(result);
    } catch(err) {
      showToast('识别出错', err.message || '请重试', 'reminder');
    }
    btn.disabled = false;
    btn.textContent = '✦ 识别日程';
  }, 250);
}

function parseText(text) {
  var now = new Date();
  var d = today();

  // Date
  if (/明天|tomorrow/i.test(text)) d = today(1);
  else if (/后天/.test(text)) d = today(2);
  else if (/大后天/.test(text)) d = today(3);
  else {
    var wd = now.getDay();
    if (/下周一|next monday/i.test(text)) d = today((8-wd)%7||7);
    else if (/下周二|next tuesday/i.test(text)) d = today((9-wd)%7||7);
    else if (/下周三|next wednesday/i.test(text)) d = today((10-wd)%7||7);
    else if (/下周四|next thursday/i.test(text)) d = today((11-wd)%7||7);
    else if (/下周五|next friday/i.test(text)) d = today((12-wd)%7||7);
    else if (/周六|saturday/i.test(text)) d = today((13-wd)%7||7);
    else if (/周日|sunday/i.test(text)) d = today((14-wd)%7||7);
    var dm = text.match(/(\d{1,2})[月\/](\d{1,2})[日号]?/);
    if (dm) {
      d = now.getFullYear() + '-' + ('0'+dm[1]).slice(-2) + '-' + ('0'+dm[2]).slice(-2);
    }
  }

  // Time
  var sh = 9, sm = 0;
  var isEvening = /晚上|今晚|傍晚|夜里|晚间/.test(text);
  var pm = isEvening || /下午|午后|pm/i.test(text);
  var am = /上午|早上|早晨|am/i.test(text);
  var noon = /中午|noon/i.test(text);
  // 先剥离日期词，避免"下周五15:30"里的15被误匹配
  var cleanText = text
    .replace(/下周[一二三四五六日]|本周[一二三四五六日]|周[一二三四五六日]/g, '')
    .replace(/明天|后天|大后天|今天|昨天/g, '');
  var t1 = cleanText.match(/(\d{1,2})[：:](\d{2})/);
  var t2 = cleanText.match(/(\d{1,2})\s*[点时]/);
  if (t1) { sh = parseInt(t1[1]); sm = parseInt(t1[2]); }
  else if (t2) { sh = parseInt(t2[1]); if (/半/.test(text)) sm = 30; }
  if (pm && sh < 12) sh += 12;
  if (noon && sh < 12) sh = 12;
  if (am && sh === 12) sh = 0;
  sh = Math.min(sh, 23);

  // Duration
  var dur = 60;
  var dm2 = text.match(/(\d+\.?\d*)\s*(?:个)?小时/);
  var mm = text.match(/(\d+)\s*分钟/);
  if (/半小时/.test(text)) dur = 30;
  else if (dm2) dur = Math.round(parseFloat(dm2[1]) * 60);
  else if (mm) dur = parseInt(mm[1]);

  var startMins = sh * 60 + sm;
  var endMins = startMins + dur;
  var eh = Math.min(Math.floor(endMins/60), 23);
  var em = endMins % 60;
  var st = ('0'+sh).slice(-2) + ':' + ('0'+sm).slice(-2);
  var et = ('0'+eh).slice(-2) + ':' + ('0'+em).slice(-2);

  // Color
  var color = 'teal';
  if (/会议|meeting|开会|讨论|call|电话/i.test(text)) color = 'teal';
  else if (/截止|deadline|提交|due|ddl/i.test(text)) color = 'accent';
  else if (/学习|复习|作业|读书|上课|考试|study|exam|homework/i.test(text)) color = 'plum';
  else if (/运动|健身|跑步|gym|workout|exercise|瑜伽/i.test(text)) color = 'sage';
  else if (/约|聚|吃饭|聚餐|朋友|dinner|lunch|party/i.test(text)) color = 'pink';
  else if (/重要|important|urgent|紧急/i.test(text)) color = 'accent';

  // Title
  var title = text
    .replace(/明天|后天|大后天|今天|下周[一二三四五六日]|周[一二三四五六日]/g, '')
    .replace(/\d{1,2}[月\/]\d{1,2}[日号]?/g, '')
    .replace(/\d{1,2}[：:]\d{2}/g, '')
    .replace(/\d{1,2}\s*[点时]\s*半?/g, '')
    .replace(/下午|上午|早上|晚上|中午|早晨|傍晚/g, '')
    .replace(/\d+\.?\d*\s*(?:个)?小时|\d+\s*分钟|半小时/g, '')
    .replace(/[，。！？,!?、\s]+/g, ' ')
    .trim();
  if (!title || title.length < 2) title = text.slice(0, 20).trim();
  title = title.slice(0, 30);

  return {title:title, date:d, startTime:st, endTime:et, color:color, reminder:10, note:''};
}

function showPreview(data) {
  var pa = document.getElementById('previewArea');
  if (!pa) return;
  pa.innerHTML = '';
  pa.style.display = 'block';

  var card = document.createElement('div'); card.className = 'preview-card';

  // Head
  var pvHead = document.createElement('div'); pvHead.className = 'pv-head';
  var badge = document.createElement('span'); badge.className = 'pv-badge'; badge.textContent = '已识别';
  var hint = document.createElement('span'); hint.className = 'pv-hint'; hint.textContent = '确认或修改后添加';
  pvHead.appendChild(badge); pvHead.appendChild(hint);

  // Body
  var pvBody = document.createElement('div'); pvBody.className = 'pv-body';

  // Title
  var pfT = document.createElement('div'); pfT.className = 'pf pv-full';
  var lbT = document.createElement('label'); lbT.textContent = '标题';
  var inT = document.createElement('input'); inT.type='text'; inT.id='pTitle'; inT.value=data.title||'';
  pfT.appendChild(lbT); pfT.appendChild(inT);

  // Date
  var pfD = document.createElement('div'); pfD.className = 'pf';
  var lbD = document.createElement('label'); lbD.textContent = '日期';
  var inD = document.createElement('input'); inD.type='date'; inD.id='pDate'; inD.value=data.date||'';
  pfD.appendChild(lbD); pfD.appendChild(inD);

  // Color
  var pfC = document.createElement('div'); pfC.className = 'pf';
  var lbC = document.createElement('label'); lbC.textContent = '颜色分类';
  var selC = document.createElement('select'); selC.id = 'pColor';
  COLORS.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = COLOR_LABELS[c]||c;
    if (c===data.color) opt.selected = true;
    selC.appendChild(opt);
  });
  pfC.appendChild(lbC); pfC.appendChild(selC);

  // Start time
  var pfS = document.createElement('div'); pfS.className = 'pf';
  var lbS = document.createElement('label'); lbS.textContent = '开始时间';
  var inS = document.createElement('input'); inS.type='time'; inS.id='pStart'; inS.value=data.startTime||'09:00';
  pfS.appendChild(lbS); pfS.appendChild(inS);

  // End time
  var pfE = document.createElement('div'); pfE.className = 'pf';
  var lbE = document.createElement('label'); lbE.textContent = '结束时间';
  var inE = document.createElement('input'); inE.type='time'; inE.id='pEnd'; inE.value=data.endTime||'10:00';
  pfE.appendChild(lbE); pfE.appendChild(inE);

  // Reminder chips
  var pfR = document.createElement('div'); pfR.className = 'pf pv-full';
  var lbR = document.createElement('label'); lbR.textContent = '提前提醒';
  var chips = document.createElement('div'); chips.className = 'rchips';
  var inR = document.createElement('input'); inR.type='hidden'; inR.id='pReminder'; inR.value=data.reminder||10;
  [0,5,10,15,30,60].forEach(function(m) {
    var chip = document.createElement('button');
    chip.className = 'rchip' + (m===(data.reminder||10)?' sel':'');
    chip.textContent = m===0?'不提醒':m+'分钟前';
    chip.onclick = function() { selChip(chip, m); };
    chips.appendChild(chip);
  });
  pfR.appendChild(lbR); pfR.appendChild(chips); pfR.appendChild(inR);

  // Note
  var pfN = document.createElement('div'); pfN.className = 'pf pv-full';
  var lbN = document.createElement('label'); lbN.textContent = '备注';
  var inN = document.createElement('input'); inN.type='text'; inN.id='pNote'; inN.value=data.note||''; inN.placeholder='可选';
  pfN.appendChild(lbN); pfN.appendChild(inN);

  pvBody.appendChild(pfT); pvBody.appendChild(pfD); pvBody.appendChild(pfC);
  pvBody.appendChild(pfS); pvBody.appendChild(pfE); pvBody.appendChild(pfR); pvBody.appendChild(pfN);

  // Footer
  var pvFoot = document.createElement('div'); pvFoot.className = 'pv-foot';
  var btnX = document.createElement('button'); btnX.className = 'btn-cancel'; btnX.textContent = '取消';
  btnX.onclick = closePreview;
  var btnOK = document.createElement('button'); btnOK.className = 'btn-confirm'; btnOK.textContent = '✓ 确认添加';
  btnOK.onclick = confirmAdd;
  pvFoot.appendChild(btnX); pvFoot.appendChild(btnOK);

  card.appendChild(pvHead); card.appendChild(pvBody); card.appendChild(pvFoot);
  pa.appendChild(card);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selChip(el, v) {
  var chips = el.parentNode.querySelectorAll('.rchip');
  for (var i=0; i<chips.length; i++) chips[i].classList.remove('sel');
  el.classList.add('sel');
  document.getElementById('pReminder').value = v;
}

function closePreview() {
  var pa = document.getElementById('previewArea');
  pa.style.display = 'none';
  pa.innerHTML = '';
}

function confirmAdd() {
  var s = {
    id: newId(),
    title: document.getElementById('pTitle').value || '新日程',
    date: document.getElementById('pDate').value,
    startTime: document.getElementById('pStart').value,
    endTime: document.getElementById('pEnd').value,
    color: document.getElementById('pColor').value,
    reminder: parseInt(document.getElementById('pReminder').value),
    note: document.getElementById('pNote').value,
    done: false
  };
  schedules.push(s);
  schedules.sort(function(a,b){ return (a.date+a.startTime).localeCompare(b.date+b.startTime); });
  save();
  closePreview();
  document.getElementById('inputTa').value = '';
  showToast('已添加：' + s.title, s.date + ' · ' + s.startTime, 'success');
  render();
}

// ── MIC ──────────────────────────────────────────────────────────
function toggleMic() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('提示', '请在 Safari 中使用语音输入', 'reminder'); return; }
  if (isRec) { if (recog) recog.stop(); return; }
  recog = new SR();
  recog.lang = 'zh-CN';
  recog.interimResults = true;
  recog.onstart = function() {
    isRec = true;
    document.getElementById('micBtn').classList.add('rec');
    document.getElementById('inputTa').placeholder = '🔴 正在聆听…';
  };
  recog.onresult = function(e) {
    var t = Array.from(e.results).map(function(r){ return r[0].transcript; }).join('');
    document.getElementById('inputTa').value = t;
  };
  recog.onerror = function(e) {
    isRec = false;
    document.getElementById('micBtn').classList.remove('rec');
    document.getElementById('inputTa').placeholder = '输入日程…如：明天下午3点和导师开会1小时';
    if (e.error === 'not-allowed') showToast('权限不足', '请允许麦克风访问', 'reminder');
  };
  recog.onend = function() {
    isRec = false;
    document.getElementById('micBtn').classList.remove('rec');
    document.getElementById('inputTa').placeholder = '输入日程…如：明天下午3点和导师开会1小时';
  };
  try { recog.start(); } catch(e) {}
}

// ── ACTIONS ──────────────────────────────────────────────────────
function toggleDone(id) {
  for (var i=0; i<schedules.length; i++) {
    if (schedules[i].id === id) { schedules[i].done = !schedules[i].done; break; }
  }
  save(); render();
}
function delSched(id) {
  schedules = schedules.filter(function(s){ return s.id !== id; });
  save(); render();
}

// ── VIEW ─────────────────────────────────────────────────────────
function setView(v) {
  curView = v;
  var views = ['list','week','day'];
  for (var i=0; i<views.length; i++) {
    var k = views[i];
    document.getElementById(k+'View').style.display = k===v ? 'block' : 'none';
    var sn = document.getElementById('sn-'+k); if (sn) sn.classList.toggle('active', k===v);
    var vt = document.getElementById('vt-'+k); if (vt) vt.classList.toggle('active', k===v);
    var bn = document.getElementById('bn-'+k); if (bn) bn.classList.toggle('active', k===v);
  }
  var bnc = document.getElementById('bn-cat'); if (bnc) bnc.classList.remove('active');
  var titles = {list:'日程列表',week:'周视图',day:'日视图'};
  document.getElementById('viewTitle').textContent = titles[v];
  var ia = document.getElementById('inputArea');
  if (ia) ia.style.display = v==='list' ? 'block' : 'none';
  closePreview();
  var cs = document.getElementById('contentEl'); if (cs) cs.scrollTop = 0;
  render();
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  renderUpcoming();
  if (curView==='list') renderList();
  else if (curView==='week') renderWeek();
  else renderDay();
}

function renderUpcoming() {
  var el = document.getElementById('upcomingEl');
  var t = today();
  var items = schedules.filter(function(s){ return !s.done && s.date >= t; });
  items.sort(function(a,b){ return (a.date+a.startTime).localeCompare(b.date+b.startTime); });
  items = items.slice(0,7);
  if (!items.length) { el.innerHTML = '<div style="padding:4px 18px;font-size:11px;color:var(--ink3)">暂无即将日程</div>'; return; }
  el.innerHTML = items.map(function(s) {
    var hex = COLOR_HEX[s.color] || '#888';
    return '<div class="up-item" style="border-left-color:' + hex + '" onclick="setView(\'list\')">'
      + '<div class="up-date">' + (s.date===t?'今天':s.date) + ' · ' + s.startTime + '</div>'
      + '<div class="up-title">' + esc(s.title) + '</div></div>';
  }).join('');
}

function renderList() {
  var el = document.getElementById('listView');
  var t = today();
  var wn = ['周日','周一','周二','周三','周四','周五','周六'];
  var sorted = schedules.slice().sort(function(a,b) {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return (a.date+a.startTime).localeCompare(b.date+b.startTime);
  });
  if (!sorted.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">◈</div><p>还没有日程<br>在上方输入并识别</p></div>';
    return;
  }
  var html = '';
  var lastDate = '';
  var openGroup = false;
  for (var i=0; i<sorted.length; i++) {
    var s = sorted[i];
    var origIdx = schedules.indexOf(s);
    if (s.date !== lastDate) {
      if (openGroup) html += '</div>';
      var d2 = new Date(s.date + 'T12:00:00');
      var lbl = s.date===t ? '今天' : s.date===today(1) ? '明天' : s.date===today(-1) ? '昨天' : (d2.getMonth()+1) + '月' + d2.getDate() + '日';
      html += '<div class="dg-head"><span class="dg-label">' + lbl + '</span><span class="dg-day">' + wn[d2.getDay()] + '</span><div class="dg-line"></div></div>';
      html += '<div class="sched-list">';
      openGroup = true;
      lastDate = s.date;
    }
    html += '<div class="si' + (s.done?' done':'') + '" draggable="true"'
      + ' ondragstart="dragSrc=' + origIdx + '"'
      + ' ondragover="event.preventDefault();event.currentTarget.classList.add(\'drag-over\')"'
      + ' ondragleave="event.currentTarget.classList.remove(\'drag-over\')"'
      + ' ondrop="event.preventDefault();event.currentTarget.classList.remove(\'drag-over\');doDrop(' + origIdx + ')">'
      + '<div class="si-stripe s-' + s.color + '"></div>'
      + '<div class="si-check' + (s.done?' checked':'') + '" onclick="toggleDone(' + s.id + ')"></div>'
      + '<div class="si-body">'
      + '<div class="si-title" onclick="openEdit(' + s.id + ')">' + esc(s.title) + '</div>'
      + '<div class="si-meta">'
      + '<span>🕐 ' + s.startTime + (s.endTime && s.endTime!==s.startTime ? ' – '+s.endTime : '') + '</span>'
      + (s.note ? '<span>📝 ' + esc(s.note) + '</span>' : '')
      + (s.reminder > 0 ? '<span style="color:var(--accent)">🔔 ' + s.reminder + 'min</span>' : '')
      + '</div></div>'
      + '<div class="si-actions">'
      + '<button class="act-btn" onclick="openEdit(' + s.id + ')" title="编辑">✎</button>'
      + '<button class="act-btn del" onclick="delSched(' + s.id + ')" title="删除">✕</button>'
      + '</div></div>';
  }
  if (openGroup) html += '</div>';
  el.innerHTML = html;
}

function doDrop(toIdx) {
  if (dragSrc === null || dragSrc === toIdx) return;
  var moved = schedules.splice(dragSrc, 1)[0];
  schedules.splice(toIdx, 0, moved);
  save(); render();
  dragSrc = null;
}

function renderWeek() {
  var el = document.getElementById('weekView');
  var now = new Date();
  var base = new Date(now);
  base.setDate(now.getDate() - now.getDay() + weekOff * 7);
  base.setHours(0,0,0,0);
  var days = [];
  for (var i=0; i<7; i++) {
    var dd = new Date(base);
    dd.setDate(base.getDate() + i);
    days.push(dd);
  }
  var t = today();
  var wshort = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var s1 = (days[0].getMonth()+1) + '月' + days[0].getDate() + '日';
  var s2 = (days[6].getMonth()+1) + '月' + days[6].getDate() + '日';
  document.getElementById('viewSub').textContent = s1 + ' — ' + s2;
  var cols = '52px repeat(7,1fr)';
  var headCells = '<div class="tt-hc" style="color:var(--ink3);font-size:10px">TIME</div>';
  for (var i=0; i<days.length; i++) {
    var dd = days[i];
    var ds = dd.toISOString().split('T')[0];
    headCells += '<div class="tt-hc' + (ds===t?' today':'') + '"><div class="tt-hd">' + wshort[dd.getDay()] + '</div><div class="tt-hn">' + dd.getDate() + '</div></div>';
  }
  var timeCol = '<div class="tt-tc">';
  for (var i=0; i<HOURS.length; i++) timeCol += '<div class="tt-ts">' + HOURS[i] + ':00</div>';
  timeCol += '</div>';
  var dayCols = '';
  for (var i=0; i<days.length; i++) {
    var dd = days[i];
    var ds = dd.toISOString().split('T')[0];
    var dayScheds = schedules.filter(function(s){ return s.date === ds; });
    var nowMs = now.getHours()*60+now.getMinutes();
    var nowTop = (nowMs - 7*60) / 60 * 50;
    var nowLine = (ds===t && nowTop>0 && nowTop<HOURS.length*50) ? '<div class="tt-now" style="top:' + nowTop + 'px"></div>' : '';
    var slots = '';
    for (var j=0; j<HOURS.length; j++) slots += '<div class="tt-slot"></div>';
    var evs = '';
    for (var j=0; j<dayScheds.length; j++) {
      var s = dayScheds[j];
      var sp = s.startTime.split(':');
      var ep = s.endTime.split(':');
      var sMin = parseInt(sp[0])*60+parseInt(sp[1]);
      var eMin = parseInt(ep[0])*60+parseInt(ep[1]);
      var top2 = (sMin - 7*60) / 60 * 50;
      var ht = Math.max((eMin-sMin)/60*50, 18);
      if (top2 < 0 || top2 > HOURS.length*50) continue;
      evs += '<div class="tt-ev ev-' + s.color + (s.done?' done':'') + '" style="top:' + top2 + 'px;height:' + ht + 'px" onclick="toggleDone(' + s.id + ')" title="' + esc(s.title) + '">'
        + '<div class="tt-et">' + s.startTime + '</div>'
        + '<div>' + esc(s.title) + '</div></div>';
    }
    dayCols += '<div class="tt-dc"' + (i===6?' style="border-right:none"':'') + '>' + slots + nowLine + evs + '</div>';
  }
  el.innerHTML = '<div class="cal-nav">'
    + '<button class="cal-btn" onclick="weekOff--;renderWeek()">‹</button>'
    + '<span class="cal-label">' + s1 + ' — ' + s2 + '</span>'
    + '<button class="cal-btn" onclick="weekOff++;renderWeek()">›</button>'
    + '<button class="cal-today" onclick="weekOff=0;renderWeek()">本周</button>'
    + '</div>'
    + '<div class="tt"><div class="tt-head" style="grid-template-columns:' + cols + '">' + headCells + '</div>'
    + '<div class="tt-body" style="grid-template-columns:' + cols + '">' + timeCol + dayCols + '</div></div>';
}

function renderDay() {
  var el = document.getElementById('dayView');
  var now = new Date();
  var d2 = new Date(now);
  d2.setDate(now.getDate() + dayOff);
  var ds = d2.toISOString().split('T')[0];
  var wn = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('viewSub').textContent = (d2.getMonth()+1) + '月' + d2.getDate() + '日 · ' + wn[d2.getDay()];
  var dayScheds = schedules.filter(function(s){ return s.date===ds; });
  dayScheds.sort(function(a,b){ return a.startTime.localeCompare(b.startTime); });
  var nowMs = now.getHours()*60+now.getMinutes();
  var nowTop = (nowMs - 7*60) / 60 * 50;
  var nowLine = (dayOff===0 && nowTop>0 && nowTop<HOURS.length*50) ? '<div class="tt-now" style="top:' + nowTop + 'px"></div>' : '';
  var slots = '';
  for (var i=0; i<HOURS.length; i++) slots += '<div class="tt-slot"></div>';
  var evs = '';
  for (var i=0; i<dayScheds.length; i++) {
    var s = dayScheds[i];
    var sp = s.startTime.split(':');
    var ep = s.endTime.split(':');
    var sMin = parseInt(sp[0])*60+parseInt(sp[1]);
    var eMin = parseInt(ep[0])*60+parseInt(ep[1]);
    var topPx = (sMin - 7*60) / 60 * 50;
    var ht = Math.max((eMin-sMin)/60*50, 22);
    if (topPx < 0 || topPx > HOURS.length*50) continue;
    evs += '<div class="tt-ev ev-' + s.color + (s.done?' done':'') + '" style="top:' + topPx + 'px;height:' + ht + 'px;left:4px;right:4px" onclick="toggleDone(' + s.id + ')">'
      + '<div class="tt-et">' + s.startTime + (s.endTime && s.endTime!==s.startTime?' – '+s.endTime:'') + '</div>'
      + '<div style="font-size:12px;margin-top:1px">' + esc(s.title) + '</div>'
      + (s.note ? '<div style="font-size:10px;opacity:0.6;margin-top:1px">' + esc(s.note) + '</div>' : '')
      + '</div>';
  }
  var dTitle = dayOff===0 ? '今天' : (d2.getMonth()+1)+'月'+d2.getDate()+'日';
  el.innerHTML = '<div class="cal-nav" style="justify-content:space-between">'
    + '<div><div style="font-size:17px;font-weight:700">' + dTitle + '</div><div style="font-size:11px;color:var(--ink3);margin-top:1px">' + wn[d2.getDay()] + ' · ' + dayScheds.length + ' 个日程</div></div>'
    + '<div style="display:flex;gap:7px">'
    + '<button class="cal-btn" onclick="dayOff--;renderDay()">‹</button>'
    + '<button class="cal-btn" onclick="dayOff++;renderDay()">›</button>'
    + '<button class="cal-today" onclick="dayOff=0;renderDay()">今天</button>'
    + '</div></div>'
    + '<div class="tt"><div class="tt-body" style="grid-template-columns:52px 1fr">'
    + '<div class="tt-tc">' + (function(){ var s=''; for(var i=0;i<HOURS.length;i++) s+='<div class="tt-ts">'+HOURS[i]+':00</div>'; return s; })() + '</div>'
    + '<div class="tt-dc" style="border-right:none">' + slots + nowLine + evs + '</div>'
    + '</div></div>';
}

// ── EDIT MODAL ───────────────────────────────────────────────────
function openEdit(id) {
  var s = null;
  for (var i=0; i<schedules.length; i++) { if (schedules[i].id===id) { s=schedules[i]; break; } }
  if (!s) return;
  var existing = document.getElementById('editModal');
  if (existing) existing.remove();

  // Build modal using DOM methods to avoid any string escaping issues
  var modal = document.createElement('div');
  modal.className = 'backdrop';
  modal.id = 'editModal';

  var box = document.createElement('div');
  box.className = 'modal';

  // Head
  var head = document.createElement('div');
  head.className = 'modal-head';
  var headTitle = document.createElement('h3');
  headTitle.textContent = '✎ 编辑日程';
  var closeBtn = document.createElement('button');
  closeBtn.className = 'modal-x';
  closeBtn.textContent = '✕';
  closeBtn.onclick = function() { modal.remove(); };
  head.appendChild(headTitle);
  head.appendChild(closeBtn);

  // Body
  var body = document.createElement('div');
  body.className = 'modal-body';

  // Title field
  var mfTitle = document.createElement('div'); mfTitle.className = 'mf';
  var lblTitle = document.createElement('label'); lblTitle.textContent = '标题';
  var inTitle = document.createElement('input'); inTitle.type = 'text'; inTitle.id = 'eTitle'; inTitle.value = s.title;
  mfTitle.appendChild(lblTitle); mfTitle.appendChild(inTitle);

  // Row: date + reminder
  var row1 = document.createElement('div'); row1.className = 'mf-row';
  var mfDate = document.createElement('div'); mfDate.className = 'mf';
  var lblDate = document.createElement('label'); lblDate.textContent = '日期';
  var inDate = document.createElement('input'); inDate.type = 'date'; inDate.id = 'eDate'; inDate.value = s.date;
  mfDate.appendChild(lblDate); mfDate.appendChild(inDate);
  var mfRemind = document.createElement('div'); mfRemind.className = 'mf';
  var lblRemind = document.createElement('label'); lblRemind.textContent = '提前提醒';
  var selRemind = document.createElement('select'); selRemind.id = 'eReminder';
  [0,5,10,15,30,60].forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m; opt.textContent = m===0?'不提醒':m+'分钟前';
    if (s.reminder===m) opt.selected = true;
    selRemind.appendChild(opt);
  });
  mfRemind.appendChild(lblRemind); mfRemind.appendChild(selRemind);
  row1.appendChild(mfDate); row1.appendChild(mfRemind);

  // Row: start + end time
  var row2 = document.createElement('div'); row2.className = 'mf-row';
  var mfStart = document.createElement('div'); mfStart.className = 'mf';
  var lblStart = document.createElement('label'); lblStart.textContent = '开始时间';
  var inStart = document.createElement('input'); inStart.type = 'time'; inStart.id = 'eStart'; inStart.value = s.startTime;
  mfStart.appendChild(lblStart); mfStart.appendChild(inStart);
  var mfEnd = document.createElement('div'); mfEnd.className = 'mf';
  var lblEnd = document.createElement('label'); lblEnd.textContent = '结束时间';
  var inEnd = document.createElement('input'); inEnd.type = 'time'; inEnd.id = 'eEnd'; inEnd.value = s.endTime;
  mfEnd.appendChild(lblEnd); mfEnd.appendChild(inEnd);
  row2.appendChild(mfStart); row2.appendChild(mfEnd);

  // Color picker
  var mfColor = document.createElement('div'); mfColor.className = 'mf';
  var lblColor = document.createElement('label'); lblColor.textContent = '颜色标签';
  var picker = document.createElement('div'); picker.className = 'cpicker';
  var inColor = document.createElement('input'); inColor.type = 'hidden'; inColor.id = 'eColor'; inColor.value = s.color;
  COLORS.forEach(function(c) {
    var dot = document.createElement('div');
    dot.className = 'cp' + (c===s.color?' sel':'');
    dot.style.background = COLOR_HEX[c];
    dot.title = COLOR_LABELS[c]||c;
    dot.onclick = function() { pickColor(dot, c); };
    picker.appendChild(dot);
  });
  mfColor.appendChild(lblColor); mfColor.appendChild(picker); mfColor.appendChild(inColor);

  // Note field
  var mfNote = document.createElement('div'); mfNote.className = 'mf';
  var lblNote = document.createElement('label'); lblNote.textContent = '备注';
  var inNote = document.createElement('input'); inNote.type = 'text'; inNote.id = 'eNote'; inNote.value = s.note||''; inNote.placeholder = '可选';
  mfNote.appendChild(lblNote); mfNote.appendChild(inNote);

  body.appendChild(mfTitle);
  body.appendChild(row1);
  body.appendChild(row2);
  body.appendChild(mfColor);
  body.appendChild(mfNote);

  // Footer
  var foot = document.createElement('div'); foot.className = 'modal-foot';
  var btnCancel = document.createElement('button'); btnCancel.className = 'btn-cancel'; btnCancel.textContent = '取消';
  btnCancel.onclick = function() { modal.remove(); };
  var btnSave = document.createElement('button'); btnSave.className = 'btn-confirm'; btnSave.textContent = '保存';
  btnSave.onclick = function() { saveEdit(s.id); };
  foot.appendChild(btnCancel); foot.appendChild(btnSave);

  box.appendChild(head);
  box.appendChild(body);
  box.appendChild(foot);
  modal.appendChild(box);
  modal.addEventListener('click', function(e) { if (e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

function pickColor(el, color) {
  var cps = el.parentNode.querySelectorAll('.cp');
  for (var i=0; i<cps.length; i++) cps[i].classList.remove('sel');
  el.classList.add('sel');
  document.getElementById('eColor').value = color;
}

function saveEdit(id) {
  for (var i=0; i<schedules.length; i++) {
    if (schedules[i].id===id) {
      schedules[i].title = document.getElementById('eTitle').value.trim() || schedules[i].title;
      schedules[i].date = document.getElementById('eDate').value;
      schedules[i].startTime = document.getElementById('eStart').value;
      schedules[i].endTime = document.getElementById('eEnd').value;
      schedules[i].color = document.getElementById('eColor').value;
      schedules[i].reminder = parseInt(document.getElementById('eReminder').value);
      schedules[i].note = document.getElementById('eNote').value.trim();
      break;
    }
  }
  save();
  document.getElementById('editModal').remove();
  showToast('已保存', '', 'success');
  render();
}

// ── CAT SETTINGS ─────────────────────────────────────────────────
function openCatModal() {
  var existing = document.getElementById('catModal');
  if (existing) existing.remove();
  var rows = COLORS.map(function(c) {
    return '<div class="cat-row"><div class="cat-dot" style="background:' + COLOR_HEX[c] + '"></div><input class="cat-in" data-color="' + c + '" value="' + esc(COLOR_LABELS[c]||c) + '" maxlength="10"></div>';
  }).join('');
  var modal = document.createElement('div');
  modal.className = 'backdrop';
  modal.id = 'catModal';
  var inner = document.createElement('div');
  inner.className = 'modal';
  inner.innerHTML = '<div class="modal-head"><h3>✦ 自定义分类</h3><button class="modal-x" onclick="document.getElementById(\'catModal\').remove()">✕</button></div>'
    + '<div class="modal-body">' + rows + '</div>'
    + '<div class="modal-foot"><button class="btn-cancel" onclick="document.getElementById(\'catModal\').remove()">取消</button><button class="btn-confirm" onclick="saveCat()">保存</button></div>';
  modal.appendChild(inner);
  modal.addEventListener('click', function(e) { if (e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

function saveCat() {
  var inputs = document.querySelectorAll('.cat-in');
  for (var i=0; i<inputs.length; i++) {
    var c = inputs[i].dataset.color;
    var v = inputs[i].value.trim();
    if (c && v) COLOR_LABELS[c] = v;
  }
  saveLabels();
  document.getElementById('catModal').remove();
  showToast('分类已更新', '', 'success');
  render();
}

// ── INIT ─────────────────────────────────────────────────────────
render();
setupReminders();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
</body>
